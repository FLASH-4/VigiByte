version: '3.8'

services:
  vigibyte:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vigibyte-app
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_APP_NAME=${VITE_APP_NAME:-VigiByte}
      - VITE_ENABLE_2FA=${VITE_ENABLE_2FA:-true}
      - VITE_ENABLE_REALTIME=${VITE_ENABLE_REALTIME:-true}
      - VITE_DEBUG_MODE=${VITE_DEBUG_MODE:-false}
    restart: unless-stopped
    networks:
      - vigibyte-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "com.vigibyte.description=VigiByte Frontend Application"
      - "com.vigibyte.version=1.0.0"

networks:
  vigibyte-network:
    driver: bridge
